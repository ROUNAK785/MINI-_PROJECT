<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPredict | Smart Stock Forecasting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #f8fafc; padding: 20px; overflow-x: hidden; }
        
        .bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; }
        .shape1 { position: absolute; width: 500px; height: 500px; background: linear-gradient(to right, #8b5cf6, #3b82f6); border-radius: 50%; filter: blur(100px); opacity: 0.4; top: -150px; left: -150px; animation: float 10s infinite alternate ease-in-out; }
        .shape2 { position: absolute; width: 400px; height: 400px; background: linear-gradient(to right, #ec4899, #f43f5e); border-radius: 50%; filter: blur(100px); opacity: 0.3; bottom: -100px; right: -100px; animation: float 12s infinite alternate ease-in-out reverse; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 80px) scale(1.1); } }

        .glass-hero { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; padding: 60px 40px; width: 100%; max-width: 800px; text-align: center; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5); animation: fadeUp 0.8s ease-out forwards; opacity: 0; transform: translateY(30px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 800; font-size: 56px; margin-bottom: 24px; color: #fff; letter-spacing: -1.5px; line-height: 1.1; }
        h1 span { background: linear-gradient(to right, #4ade80, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        p { font-size: 20px; color: #94a3b8; line-height: 1.6; margin-bottom: 40px; font-weight: 300; }

        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        
        a.btn { text-decoration: none; padding: 18px 40px; border-radius: 100px; font-size: 18px; font-weight: 600; transition: all 0.3s ease; display: inline-block; }
        
        .btn-primary { background: linear-gradient(to right, #8b5cf6, #3b82f6); color: white; box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 20px 30px -10px rgba(139, 92, 246, 0.6); }
        
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #f8fafc; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape1"></div>
        <div class="shape2"></div>
    </div>
    
    <div class="glass-hero">
        <h1>Predict the Future of <span>Stocks</span></h1>
        <p>Leverage cutting-edge machine learning algorithms powered by XGBoost to analyze market movements and forecast prices in real-time.</p>
        
        <div class="btn-group">
            <a href="/login" class="btn btn-primary">Log In</a>
            <a href="/register" class="btn btn-secondary">Create Free Account</a>
        </div>
    </div>
</body>
</html>
