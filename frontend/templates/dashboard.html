<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FinPredict</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #f8fafc; padding: 20px; }
        .bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; }
        .shape1 { position: absolute; width: 400px; height: 400px; background: linear-gradient(to right, #8b5cf6, #3b82f6); border-radius: 50%; filter: blur(80px); opacity: 0.5; top: -100px; left: -100px; animation: float 8s infinite alternate ease-in-out; }
        .shape2 { position: absolute; width: 300px; height: 300px; background: linear-gradient(to right, #ec4899, #f43f5e); border-radius: 50%; filter: blur(80px); opacity: 0.4; bottom: -50px; right: -50px; animation: float 10s infinite alternate ease-in-out reverse; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }
        .glass-container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h2 { font-weight: 600; font-size: 28px; margin-bottom: 24px; text-align: center; color: #fff; letter-spacing: -0.5px; }
        form { display: flex; flex-direction: column; gap: 16px; }
        input { width: 100%; padding: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 15px; outline: none; transition: all 0.3s ease; }
        input:focus { background: rgba(255, 255, 255, 0.1); border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }
        input::placeholder { color: #94a3b8; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(to right, #8b5cf6, #3b82f6); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; margin-top: 8px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.6); }
        a { display: block; text-align: center; margin-top: 24px; color: #94a3b8; text-decoration: none; font-size: 14px; transition: color 0.3s ease; }
        a:hover { color: #fff; }

        .ticker-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; margin-bottom: 8px; }
        .ticker-tags span { background: rgba(255, 255, 255, 0.05); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: #94a3b8; cursor: pointer; transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.1); }
        .ticker-tags span:hover { background: rgba(139, 92, 246, 0.3); color: #fff; border-color: #8b5cf6; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape1"></div>
        <div class="shape2"></div>
    </div>
    <div class="glass-container">
        <h2>Stock Dashboard</h2>
        <form method="POST" action="/predict">
            <input type="text" name="stock" placeholder="Enter stock ticker (e.g. RELIANCE.NS)" required autocomplete="off">
            
            <div style="font-size: 13px; color: #94a3b8; text-align: center; margin-top: 8px;">Quick Select:</div>
            <div class="ticker-tags">
                <span onclick="document.querySelector('input[name=stock]').value='RELIANCE.NS'">RELIANCE.NS</span>
                <span onclick="document.querySelector('input[name=stock]').value='TCS.NS'">TCS.NS</span>
                <span onclick="document.querySelector('input[name=stock]').value='HDFCBANK.NS'">HDFCBANK.NS</span>
                <span onclick="document.querySelector('input[name=stock]').value='INFY.NS'">INFY.NS</span>
                <span onclick="document.querySelector('input[name=stock]').value='AAPL'">AAPL</span>
                <span onclick="document.querySelector('input[name=stock]').value='TSLA'">TSLA</span>
            </div>

            <button type="submit" style="margin-top: 8px;">Predict Real-Time Trend</button>
        </form>
        <a href="/logout">Logout securely</a>
    </div>
</body>
</html>
